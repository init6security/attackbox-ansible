# Docker-based test inventory. Container names match the inventory hostnames so
# the community.docker connection plugin targets them directly (no SSH needed).
# test/run.sh creates/destroys these containers and selects one with --limit.
[attackbox]
attackbox-test-kali   ansible_connection=community.docker.docker
attackbox-test-parrot ansible_connection=community.docker.docker
attackbox-test-debian ansible_connection=community.docker.docker
attackbox-test-ubuntu ansible_connection=community.docker.docker
