---
# Base build/runtime dependencies + system utilities. Includes gocryptfs/fuse3,
# the Go toolchain, mingw-w64, and the build deps needed to compile John (jumbo)
# and hashcat from source. This is also where we guarantee "basic tools" (curl,
# gnupg, git, python3 …) exist on minimal images before later steps need them.
apt_base_packages:
  - build-essential
  - autoconf
  - pkg-config
  - git
  - curl
  - wget
  - gnupg
  - ca-certificates
  - unzip
  - p7zip-full
  - rsync
  - screen
  - tmux
  - ncurses-term              # tmux-256color / rich terminfo entries
  - htop
  - jq
  - ripgrep
  - lsof
  - vim
  - python3
  - python3-pip
  - python3-venv
  - python3-dev
  - pipx
  - golang-go
  - cargo                     # NetExec deps (aardwolf) build Rust extensions
  - rustc
  - ruby
  - ruby-dev                  # gem native extensions (evil-winrm, wpscan on Debian/Ubuntu)
  - libcurl4-openssl-dev      # wpscan gem (typhoeus)
  - libxml2-dev               # wpscan gem (nokogiri)
  - libxslt1-dev              # wpscan gem (nokogiri)
  - perl                      # nikto
  - mingw-w64                 # Windows cross-compilation
  - fuse3                     # gocryptfs
  - gocryptfs
  # John-the-Ripper (jumbo) + hashcat build dependencies
  - libssl-dev
  - libffi-dev
  - zlib1g-dev
  - libgmp-dev
  - libpcap-dev
  - libbz2-dev
  - libnss3-dev
  - libkrb5-dev
  - libcrypt-dev              # John: enables the generic crypt(3) format (more hash types)
  - yasm
  - ocl-icd-opencl-dev        # hashcat (OpenCL headers)
  - clang                     # hashcat 7.x Rust bridge plugins (bindgen)
  - libclang-dev              # provides libclang.so for bindgen
