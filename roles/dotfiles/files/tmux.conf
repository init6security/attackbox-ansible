# attackbox-ansible — tmux configuration
# Sane defaults plus automatic logging of every pane to /opt/logs (engagement
# record). /opt is the encrypted gocryptfs volume — mount it before starting
# tmux so logs land encrypted.

# --- General ---------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"      # truecolor passthrough
set -g history-limit 100000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -s escape-time 10
set -g focus-events on
set -g display-time 2000
setw -g mode-keys vi

# --- Titles ----------------------------------------------------------------
set -g set-titles on
set -g set-titles-string "#H:#S:#W"
setw -g automatic-rename on

# --- Status line -----------------------------------------------------------
set -g status-interval 5
set -g status-left "#[fg=colour232,bg=colour154,bold] #S #[default] "
set -g status-left-length 30
set -g status-right "#[fg=colour250] #H  #[fg=colour252]%Y-%m-%d %H:%M "
set -g status-right-length 60
setw -g window-status-current-format " #I:#W#F "
setw -g window-status-format " #I:#W#F "

# --- Key bindings ----------------------------------------------------------
bind r source-file ~/.tmux.conf \; display "reloaded ~/.tmux.conf"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# --- Automatic per-pane logging -> /opt/logs -------------------------------
# Every new/split pane pipes its output to a log file. The manual toggle (P)
# lets you stop/restart logging for the current pane.
set-hook -g session-created   'pipe-pane -o "mkdir -p /opt/logs 2>/dev/null; cat >> /opt/logs/tmux-#S-#I.#P.log"'
set-hook -g after-new-window   'pipe-pane -o "mkdir -p /opt/logs 2>/dev/null; cat >> /opt/logs/tmux-#S-#I.#P.log"'
set-hook -g after-split-window 'pipe-pane -o "mkdir -p /opt/logs 2>/dev/null; cat >> /opt/logs/tmux-#S-#I.#P.log"'
bind P pipe-pane -o "mkdir -p /opt/logs 2>/dev/null; cat >> /opt/logs/tmux-#S-#I.#P.log" \; display "toggled pane logging -> /opt/logs"
