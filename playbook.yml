---
# ============================================================================
# attackbox-ansible — build a pentest/red-team box on Kali, Parrot, or Debian
# ----------------------------------------------------------------------------
# Connect as root (the example inventory + the docker test harness both do).
# Operator-facing config lives in group_vars/all.yml; each role documents its
# own defaults under roles/<name>/defaults/main.yml.
#
# Run everything:   ansible-playbook -i inventory.list playbook.yml
# Fast smoke run:   ansible-playbook -i inventory.list playbook.yml --skip-tags heavy
# Just the crypto:  ansible-playbook -i inventory.list playbook.yml --tags crypto
# ============================================================================
- name: Attack Box
  hosts: attackbox
  gather_facts: false          # minimal images may lack python3 — bootstrap first
  become: "{{ attackbox_become | default(false) }}"

  vars:
    # Random per-host passphrase for the encrypted volume. The password lookup
    # writes the plaintext to credentials/<host>/gocryptfs.txt on the CONTROL
    # node (git-ignored) and returns the value.
    gocryptfs_passphrase: >-
      {{ lookup('password',
                'credentials/' + inventory_hostname + '/gocryptfs.txt length=32 chars=ascii_letters,digits') }}

  pre_tasks:
    - name: Bootstrap python3 so Ansible modules can run (raw, no facts yet)
      ansible.builtin.raw: >-
        test -e /usr/bin/python3 || {
          command -v apt-get >/dev/null 2>&1 &&
          (apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y python3);
        }
      changed_when: false
      tags: always

    - name: Gather facts now that python3 is present
      ansible.builtin.setup:
      tags: always

  roles:
    - role: common
      tags: [base]
    - role: gocryptfs
      tags: [crypto]
    - role: tools_packages
      tags: [pkgtools]
    - role: metasploit
      tags: [metasploit, heavy]
      when: install_metasploit | bool
    - role: tools_source
      tags: [source]
    - role: empire
      tags: [empire]          # clone runs in smoke; only install.sh is tagged heavy (in-role)
    - role: reference_data
      tags: [data]
    - role: windows_resources
      tags: [windows-resources, heavy]     # bulky binary collections (Debian/Ubuntu)
    - role: dotfiles
      tags: [dotfiles]
    - role: ssh_hardening
      tags: [ssh]
      when: harden_ssh | bool
